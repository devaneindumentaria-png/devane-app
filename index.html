<style>
  :root {
    --bg:#0f0f17;--surface:#1a1a2e;--surface2:#222238;
    --accent:#c9a96e;--accent2:#e8c99a;--text:#f0ece4;--text2:#9d9ab0;
    --danger:#e07070;--success:#70c4a0;--border:rgba(201,169,110,0.2);--radius:16px;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:480px;margin:0 auto;overflow-x:hidden}
  .header{padding:20px 20px 16px;background:linear-gradient(180deg,var(--surface) 0%,transparent 100%);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
  .header-top{display:flex;justify-content:space-between;align-items:center}
  .logo{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:var(--accent);letter-spacing:2px;text-transform:uppercase}
  .logo span{font-style:italic;font-weight:400}
  .status-dot{width:8px;height:8px;border-radius:50%;background:var(--success);box-shadow:0 0 8px var(--success)}

  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
  .nav{display:flex;gap:4px;background:var(--surface);padding:6px;border-radius:14px;margin:12px 20px 20px}
  .nav-btn{flex:1;padding:10px 4px;border:none;background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;border-radius:10px;cursor:pointer;transition:all 0.2s;display:flex;flex-direction:column;align-items:center;gap:4px;letter-spacing:0.5px;text-transform:uppercase}
  .nav-btn .icon{font-size:18px}
  .nav-btn.active{background:var(--accent);color:var(--bg);font-weight:600}
  .screen{display:none;padding:0 20px 100px;animation:fadeIn 0.25s ease}
  .screen.active{display:block}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .search-wrap{position:relative;margin-bottom:16px}
  .search-wrap input{width:100%;padding:14px 48px 14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:border-color 0.2s}
  .search-wrap input:focus{border-color:var(--accent)}
  .search-wrap input::placeholder{color:var(--text2)}
  .search-icon{position:absolute;right:16px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:18px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;cursor:pointer;transition:all 0.2s}
  .card:active{border-color:var(--accent)}
  .card-name{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--text);margin-bottom:4px}
  .card-detail{font-size:13px;color:var(--text2);margin-bottom:2px}
  .card-tags{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
  .tag{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500}
  .tag-depto{background:rgba(201,169,110,0.15);color:var(--accent)}
  .tag-envios{background:rgba(112,196,160,0.15);color:var(--success)}
  .tag-fecha{background:rgba(157,154,176,0.1);color:var(--text2)}
  .section-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--accent);margin-bottom:16px;letter-spacing:1px}
  .stats-bar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px}
  .stat-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 10px;text-align:center}
  .stat-num{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:var(--accent);line-height:1;margin-bottom:4px}
  .stat-label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px}
  .form-group{margin-bottom:16px}
  .form-label{display:block;font-size:11px;font-weight:500;color:var(--text2);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
  .form-input{width:100%;padding:13px 16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:border-color 0.2s}
  .form-input:focus{border-color:var(--accent)}
  .form-input::placeholder{color:var(--text2)}

  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

  .btn-secondary{background:transparent;color:var(--accent);border:1px solid var(--accent);margin-top:10px}
  .total-display{background:linear-gradient(135deg,var(--surface) 0%,var(--surface2) 100%);border:1px solid var(--accent);border-radius:var(--radius);padding:20px;text-align:center;margin:20px 0}
  .total-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
  .total-amount{font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:600;color:var(--accent)}

  .modal{background:var(--surface);border-radius:24px 24px 0 0;padding:24px 20px 40px;width:100%;max-width:480px;border-top:1px solid var(--border);animation:slideUp 0.3s ease;max-height:90vh;overflow-y:auto}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .modal-handle{width:40px;height:4px;background:var(--text2);border-radius:2px;margin:0 auto 20px;opacity:0.4}

  .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);border-radius:24px;padding:12px 24px;font-size:14px;color:var(--text);z-index:300;display:none;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
  .toast.success{border-color:var(--success);color:var(--success)}
  .toast.error{border-color:var(--danger);color:var(--danger)}
  .toast.show{display:block;animation:toastIn 0.3s ease}
  @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
  .empty{text-align:center;padding:60px 20px;color:var(--text2)}
  .empty-icon{font-size:48px;margin-bottom:16px;opacity:0.5}
  .empty-text{font-size:15px;line-height:1.6}
  .loader{display:flex;justify-content:center;padding:40px}
  .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .detail-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
  .detail-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:12px}
  .detail-row:last-child{margin-bottom:0}
  .detail-key{font-size:12px;color:var(--text2);min-width:80px}
  .detail-val{font-size:14px;color:var(--text);text-align:right;flex:1}
  .venta-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px}
  .venta-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .venta-nombre{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600}
  .venta-monto{font-size:18px;font-weight:600;color:var(--accent)}
  .venta-detail{font-size:12px;color:var(--text2)}
  .divider{height:1px;background:var(--border);margin:20px 0}
  .rls-warning{background:rgba(201,169,110,0.08);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:16px;font-size:13px;color:var(--text2);line-height:1.6}
  .rls-warning strong{color:var(--accent)}
</style>
</head>
<body>

<div class="header">

<!-- CLIENTES -->

      <div class="card-detail" id="ventaClientaTel"></div>
      <div class="card-detail" id="ventaClientaDir" style="font-size:12px;margin-top:4px"></div>
      <button onclick="limpiarClientaVenta()" style="margin-top:10px;background:none;border:1px solid var(--border);color:var(--text2);padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer">Cambiar clienta</button>
    </div>
  </div>
  <div class="form-group">
    <label class="form-label">Artículo</label>
    <select id="ventaArticulo" class="form-input">
      <option value="">Seleccionar…</option>
      <option>Vestido</option><option>Remera</option><option>Pantalón</option>
      <option>Falda</option><option>Campera</option><option>Conjunto</option>

  <div class="form-group">
    <label class="form-label">Método de pago</label>

  <div class="form-group">

  <div class="total-display">
    <div class="total-label">Total a cobrar</div>
    <div class="total-amount">$<span id="totalDisplay">0</span></div>
  </div>
  <button class="btn btn-primary" id="btnRegistrar" onclick="registrarVenta()">Registrar venta</button>
</div>

<!-- HISTORIAL -->
<div class="screen" id="screen-historial">
  <div class="section-title">Historial de ventas</div>
  <div id="historialList"></div>
</div>

<!-- AGREGAR CLIENTA -->
<div class="screen" id="screen-agregar">
  <div class="section-title">Nueva clienta</div>
  <div class="form-group">
    <label class="form-label">Nombre</label>
    <input type="text" id="nuevaNombre" class="form-input" placeholder="Nombre completo">

    <label class="form-label">Teléfono</label>

      <option>Rivera</option><option>Salto</option><option>Paysandú</option>
      <option>Artigas</option><option>Tacuarembó</option><option>Cerro Largo</option>
      <option>Treinta y Tres</option><option>Rocha</option><option>Lavalleja</option>
      <option>Florida</option><option>Flores</option><option>Durazno</option><option>Río Negro</option>

    <input type="text" id="nuevaNotas" class="form-input" placeholder="Horario, referencias…">

<!-- MODAL CLIENTA -->
<div class="modal-overlay" id="modalOverlay" onclick="cerrarModalSiOverlay(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalNombre"></div>
    <div class="detail-section" id="modalInfo"></div>
    <button class="btn btn-primary" onclick="irAVentaDesdeModal()">➕ Registrar venta</button>
    <button class="btn btn-secondary" onclick="cerrarModal()">Cerrar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── SUPABASE CONFIG ──────────────────────────────────────
const SUPABASE_URL = 'https://olhnnavpojoqepklnwrf.supabase.co';
const SUPABASE_KEY = 'sb_publishable_P7_aByJY9lS14ZaSMryhFQ_UwCsEflS';

const API = {
  async get(table, params = '') {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json'
      }
    });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async post(table, data) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation'
      },
      body: JSON.stringify(data)
    });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  }
};

// ── STATE ────────────────────────────────────────────────
let CLIENTES = [];
let clientaSeleccionada = null;

// ── INIT ─────────────────────────────────────────────────
window.addEventListener('load', () => {
  cargarClientes();
});

// ── HELPERS ──────────────────────────────────────────────
function toast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  setTimeout(() => t.className = 'toast', 3500);
}
function loader(id) {
  document.getElementById(id).innerHTML = '<div class="loader"><div class="spinner"></div></div>';
}
function empty(id, icon, msg) {
  document.getElementById(id).innerHTML = `<div class="empty"><div class="empty-icon">${icon}</div><div class="empty-text">${msg}</div></div>`;
}
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  document.getElementById('nav-' + id).classList.add('active');
  if (id === 'historial') cargarHistorial();
}

// ── CLIENTES ─────────────────────────────────────────────
async function cargarClientes() {
  loader('clientesList');
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot loading';
  try {
    CLIENTES = await API.get('clientes', 'order=nombre.asc&limit=2000');
    dot.className = 'status-dot';
    actualizarStats();
    renderClientes(CLIENTES);
  } catch(e) {
    dot.className = 'status-dot';
    empty('clientesList', '⚠️', 'Error al cargar. Verificá la conexión.');
    toast('Error: ' + e.message, 'error');
  }
}

function actualizarStats() {
  document.getElementById('statTotal').textContent = CLIENTES.length;
  document.getElementById('statRecurrentes').textContent = CLIENTES.filter(c => c.cantidad_envios > 1).length;
  document.getElementById('statMvd').textContent = CLIENTES.filter(c => c.departamento === 'Montevideo').length;
}

function renderClientes(lista) {
  const el = document.getElementById('clientesList');
  if (!lista.length) { empty('clientesList', '👗', 'No se encontraron clientas'); return; }
  el.innerHTML = lista.slice(0, 80).map(c => `
    <div class="card" onclick='abrirModal(${JSON.stringify(c).replace(/'/g,"&#39;")})'>
      <div class="card-name">${c.nombre || 'Sin nombre'}</div>
      <div class="card-detail">📱 ${c.telefono || '—'}</div>
      ${c.direccion ? `<div class="card-detail">📍 ${c.direccion.substring(0,50)}${c.direccion.length>50?'…':''}</div>` : ''}
      <div class="card-tags">
        ${c.departamento ? `<span class="tag tag-depto">${c.departamento}</span>` : ''}
        ${c.cantidad_envios > 0 ? `<span class="tag tag-envios">${c.cantidad_envios} envío${c.cantidad_envios>1?'s':''}</span>` : ''}
        ${c.fecha_ultimo_envio ? `<span class="tag tag-fecha">${c.fecha_ultimo_envio.substring(0,10)}</span>` : ''}
      </div>
    </div>`).join('');
  if (lista.length > 80) {
    el.innerHTML += `<div style="text-align:center;color:var(--text2);padding:16px;font-size:13px">Mostrando 80 de ${lista.length} — buscá para filtrar</div>`;
  }
}

function buscarClientes() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  if (!q) { renderClientes(CLIENTES); return; }
  renderClientes(CLIENTES.filter(c =>
    (c.nombre||'').toLowerCase().includes(q) ||
    (c.telefono||'').includes(q) ||
    (c.departamento||'').toLowerCase().includes(q) ||
    (c.localidad||'').toLowerCase().includes(q)
  ));
}

// ── MODAL ─────────────────────────────────────────────────
function abrirModal(c) {
  clientaSeleccionada = c;
  document.getElementById('modalNombre').textContent = c.nombre || 'Sin nombre';
  document.getElementById('modalInfo').innerHTML = `
    <div class="detail-row"><span class="detail-key">Teléfono</span><span class="detail-val">${c.telefono||'—'}</span></div>
    <div class="detail-row"><span class="detail-key">Dirección</span><span class="detail-val">${c.direccion||'—'}</span></div>
    <div class="detail-row"><span class="detail-key">Departamento</span><span class="detail-val">${c.departamento||'—'}</span></div>
    ${c.localidad?`<div class="detail-row"><span class="detail-key">Localidad</span><span class="detail-val">${c.localidad}</span></div>`:''}
    ${c.notas?`<div class="detail-row"><span class="detail-key">Notas</span><span class="detail-val">${c.notas}</span></div>`:''}
    <div class="detail-row"><span class="detail-key">Envíos</span><span class="detail-val">${c.cantidad_envios||0}</span></div>
    ${c.fecha_ultimo_envio?`<div class="detail-row"><span class="detail-key">Último</span><span class="detail-val">${c.fecha_ultimo_envio.substring(0,10)}</span></div>`:''}
  `;
  document.getElementById('modalOverlay').classList.add('open');
}
function cerrarModalSiOverlay(e) { if(e.target===document.getElementById('modalOverlay')) cerrarModal(); }
function cerrarModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function irAVentaDesdeModal() {
  cerrarModal();
  seleccionarClientaVenta(clientaSeleccionada);
  showScreen('nueva-venta');
}

// ── NUEVA VENTA ───────────────────────────────────────────
function buscarParaVenta() {
  const q = document.getElementById('ventaClientaBuscar').value.toLowerCase().trim();
  const el = document.getElementById('ventaClientaSugerencias');
  if (!q || q.length < 2) { el.innerHTML = ''; return; }
  const filtradas = CLIENTES.filter(c =>
    (c.nombre||'').toLowerCase().includes(q) || (c.telefono||'').includes(q)
  ).slice(0, 5);
  if (!filtradas.length) { el.innerHTML = ''; return; }
  el.innerHTML = filtradas.map(c => `
    <div class="card" style="margin-bottom:4px;padding:12px" onclick='seleccionarClientaVenta(${JSON.stringify(c).replace(/'/g,"&#39;")})'>
      <div class="card-name" style="font-size:16px">${c.nombre}</div>
      <div class="card-detail">📱 ${c.telefono} · ${c.departamento||''}</div>
    </div>`).join('');
}

function seleccionarClientaVenta(c) {
  clientaSeleccionada = c;
  document.getElementById('ventaClientaBuscar').style.display = 'none';
  document.getElementById('ventaClientaSugerencias').innerHTML = '';
  const sel = document.getElementById('ventaClientaSeleccionada');
  sel.style.display = 'block';
  document.getElementById('ventaClientaNombre').textContent = c.nombre;
  document.getElementById('ventaClientaTel').textContent = '📱 ' + c.telefono;
  document.getElementById('ventaClientaDir').textContent = c.direccion ? '📍 ' + c.direccion.substring(0,60) : '';
}

function limpiarClientaVenta() {
  clientaSeleccionada = null;
  document.getElementById('ventaClientaBuscar').style.display = '';
  document.getElementById('ventaClientaBuscar').value = '';
  document.getElementById('ventaClientaSeleccionada').style.display = 'none';
}

function calcTotal() {
  const m = parseFloat(document.getElementById('ventaMonto').value) || 0;
  const e = parseFloat(document.getElementById('ventaEnvio').value) || 0;
  document.getElementById('totalDisplay').textContent = (m + e).toLocaleString('es-UY');
}

async function registrarVenta() {
  if (!clientaSeleccionada) { toast('Seleccioná una clienta', 'error'); return; }
  const btn = document.getElementById('btnRegistrar');
  btn.disabled = true; btn.textContent = 'Guardando…';
  const c = clientaSeleccionada;
  const monto = parseFloat(document.getElementById('ventaMonto').value) || 0;
  const envio = parseFloat(document.getElementById('ventaEnvio').value) || 0;
  try {
    await API.post('ventas', {
      fecha: new Date().toISOString().split('T')[0],
      nombre_cliente: c.nombre,
      telefono: c.telefono,
      direccion: c.direccion || '',
      departamento: c.departamento || '',
      localidad: c.localidad || '',
      notas_direccion: c.notas || '',
      notas_venta: document.getElementById('ventaNotas').value,
      articulo: document.getElementById('ventaArticulo').value,
      monto: monto,
      envio: envio,
      total: monto + envio,
      pago: document.getElementById('ventaPago').value,
      canal: document.getElementById('ventaCanal').value,
      estado: 'Pendiente'
    });
    toast('Venta registrada ✓', 'success');
    limpiarFormVenta();
  } catch(e) {
    toast('Error: ' + e.message, 'error');
  }
  btn.disabled = false; btn.textContent = 'Registrar venta';
}

function limpiarFormVenta() {
  limpiarClientaVenta();
  ['ventaArticulo','ventaMonto','ventaEnvio','ventaNotas'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('ventaPago').value = 'Abona al recibir';
  document.getElementById('ventaCanal').value = 'Envío propio';
  document.getElementById('totalDisplay').textContent = '0';
}

// ── HISTORIAL ─────────────────────────────────────────────
async function cargarHistorial() {
  loader('historialList');
  try {
    const ventas = await API.get('ventas', 'order=created_at.desc&limit=50');
    if (!ventas.length) { empty('historialList', '📋', 'No hay ventas aún'); return; }
    document.getElementById('historialList').innerHTML = ventas.map(v => `
      <div class="venta-card">
        <div class="venta-header">
          <div class="venta-nombre">${v.nombre_cliente||'—'}</div>
          <div class="venta-monto">$${(v.total||0).toLocaleString('es-UY')}</div>
        </div>
        <div class="venta-detail">${v.articulo||'—'} · ${v.canal||'—'}</div>
        <div class="venta-detail" style="margin-top:4px">${v.fecha||''} · ${v.pago||''}</div>
      </div>`).join('');
  } catch(e) {
    empty('historialList', '⚠️', 'Error al cargar historial');
  }
}

// ── AGREGAR CLIENTA ───────────────────────────────────────
async function agregarClienta() {
  const nombre = document.getElementById('nuevaNombre').value.trim();
  const tel = document.getElementById('nuevaTel').value.trim();
  if (!nombre || !tel) { toast('Nombre y teléfono son obligatorios', 'error'); return; }
  const btn = document.getElementById('btnAgregar');
  btn.disabled = true; btn.textContent = 'Guardando…';
  try {
    await API.post('clientes', {
      nombre: nombre,
      telefono: tel.replace(/\D/g,'').slice(-9),
      direccion: document.getElementById('nuevaDireccion').value.trim(),
      departamento: document.getElementById('nuevaDepartamento').value,
      notas: document.getElementById('nuevaNotas').value.trim(),
      fecha_ultimo_envio: new Date().toISOString().split('T')[0],
      cantidad_envios: 0
    });
    toast('Clienta agregada ✓', 'success');
    ['nuevaNombre','nuevaTel','nuevaDireccion','nuevaNotas'].forEach(id => document.getElementById(id).value = '');
    await cargarClientes();
    showScreen('clientes');
  } catch(e) {
    toast('Error: ' + e.message, 'error');
  }
  btn.disabled = false; btn.textContent = 'Agregar clienta';
}
</script>
